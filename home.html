<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <title>Videos</title>
    <link rel="stylesheet" href="style.css">
</head>

<body class="home-body">

<!-- PROFILE -->
<div class="profile-box">
    <div id="userEmail"></div>
    <div id="userRole"></div>
</div>

<header>
    <h1>🎬 ვიდეოები</h1>
</header>

<!-- SEARCH -->
<div class="search-box">
    <input type="text" id="searchInput" onkeyup="searchVideos()" placeholder="Search...">
</div>

<!-- VIDEO GRID -->
<div class="video-grid">

    <div class="video-card">
        <video controls src="videos/video1.mp4"></video>
        <div class="video-info"><h3>კუბლას გაპარვა</h3></div>
    </div>

    <div class="video-card">
        <video controls src="videos/video2.mp4"></video>
        <div class="video-info"><h3>Damon Vs Elena</h3></div>
    </div>

    <div class="video-card">
        <video controls src="videos/video3.mp4"></video>
        <div class="video-info"><h3>Hokage</h3></div>
    </div>

    <div class="video-card">
        <video controls src="videos/video4.mp4"></video>
        <div class="video-info"><h3>Gigi Vs Ani</h3></div>
    </div>

    <div class="video-card">
        <video controls src="videos/video5.mp4"></video>
        <div class="video-info"><h3>აბანცულა რანცულა</h3></div>
    </div>

    <div class="video-card">
        <video controls src="videos/video6.mp4"></video>
        <div class="video-info"><h3>ანის boogers</h3></div>
    </div>

    <div class="video-card">
        <video controls src="videos/video7.mp4"></video>
        <div class="video-info"><h3>კლოუნი</h3></div>
    </div>

    <div class="video-card">
        <video controls src="videos/video8.mp4"></video>
        <div class="video-info"><h3>Video 8</h3></div>
    </div>

    <div class="video-card">
        <video controls src="videos/video9.mp4"></video>
        <div class="video-info"><h3>Video 9</h3></div>
    </div>

    <div class="video-card">
        <video controls src="videos/video10.mp4"></video>
        <div class="video-info"><h3>Video 10</h3></div>
    </div>

</div>

<script>
/* PROFILE */
const email = localStorage.getItem("userEmail");
const role = localStorage.getItem("userRole");

const roleEl = document.getElementById("userRole");

document.getElementById("userEmail").textContent = email || "Guest";
roleEl.textContent = role || "Visitor";

/* ROLE STYLE */
if (role === "Admin") {
    roleEl.classList.add("admin");
} else if (role === "Member") {
    roleEl.classList.add("member");
}

/* SEARCH */
function searchVideos() {
    let input = document.getElementById("searchInput").value.toLowerCase();
    let cards = document.querySelectorAll(".video-card");

    cards.forEach(card => {
        let title = card.querySelector("h3").textContent.toLowerCase();
        card.style.display = title.includes(input) ? "block" : "none";
    });
}
</script>

</body>
</html>
