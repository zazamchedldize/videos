<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <title>ვიდეოები</title>
    <link rel="stylesheet" href="style.css">
</head>

<body class="home-body">

    <!-- HEADER -->
    <header>
        <h1>🎬 ვიდეოები</h1>
    </header>

    <!-- SEARCH -->
    <div class="search-box">
        <input
            type="text"
            id="searchInput"
            placeholder="🔍 მოძებნე ვიდეო..."
            onkeyup="searchVideos()"
        >
    </div>

    <!-- VIDEO GRID -->
    <div class="video-grid" id="videoGrid">

        <!-- VIDEO 1 -->
        <div class="video-card">
            <video controls src="videos/video1.mp4"></video>

            <div class="video-info">
                <h3>კუბლას გაპარვა</h3>
                <p>prison break</p>

                <button class="download-btn" data-src="videos/video1.mp4">⬇ Download</button>
            </div>
        </div>

        <!-- VIDEO 2 -->
        <div class="video-card">
            <video controls src="videos/video2.mp4"></video>

            <div class="video-info">
                <h3>Damon Vs Elena</h3>
                <p>love story</p>

                <button class="download-btn" data-src="videos/video2.mp4">⬇ Download</button>
            </div>
        </div>

        <!-- VIDEO 3 -->
        <div class="video-card">
            <video controls src="videos/video3.mp4"></video>

            <div class="video-info">
                <h3>Hokage</h3>
                <p>ლუკა ყ*ეა</p>

                <button class="download-btn" data-src="videos/video3.mp4">⬇ Download</button>
            </div>
        </div>

        <!-- VIDEO 4 -->
        <div class="video-card">
            <video controls src="videos/video4.mp4"></video>

            <div class="video-info">
                <h3>Gigi Vs Ani</h3>
                <p>კრივი</p>

                <button class="download-btn" data-src="videos/video4.mp4">⬇ Download</button>
            </div>
        </div>

        <!-- VIDEO 5 -->
        <div class="video-card">
            <video controls src="videos/video5.mp4"></video>

            <div class="video-info">
                <h3>აბანცულა რანცულა</h3>
                <p>საბას სიმღერა</p>

                <button class="download-btn" data-src="videos/video5.mp4">⬇ Download</button>
            </div>
        </div>

        <!-- VIDEO 6 -->
        <div class="video-card">
            <video controls src="videos/video6.mp4"></video>

            <div class="video-info">
                <h3>ანის ჟღვინტი</h3>
                <p>ცხვირის გაწმენდა</p>

                <button class="download-btn" data-src="videos/video6.mp4">⬇ Download</button>
            </div>
        </div>

        <!-- VIDEO 7 -->
        <div class="video-card">
            <video controls src="videos/video7.mp4"></video>

            <div class="video-info">
                <h3>ანის შესრულება</h3>
                <p>ცეკვა</p>

                <button class="download-btn" data-src="videos/video7.mp4">⬇ Download</button>
            </div>
        </div>

        <!-- VIDEO 8 -->
        <div class="video-card">
            <video controls src="videos/video8.mp4"></video>

            <div class="video-info">
                <h3>Video 8</h3>

                <button class="download-btn" data-src="videos/video8.mp4">⬇ Download</button>
            </div>
        </div>

        <!-- VIDEO 9 -->
        <div class="video-card">
            <video controls src="videos/video9.mp4"></video>

            <div class="video-info">
                <h3>Video 9</h3>

                <button class="download-btn" data-src="videos/video9.mp4">⬇ Download</button>
            </div>
        </div>

        <!-- VIDEO 10 -->
        <div class="video-card">
            <video controls src="videos/video10.mp4"></video>

            <div class="video-info">
                <h3>Video 10</h3>

                <button class="download-btn" data-src="videos/video10.mp4">⬇ Download</button>
            </div>
        </div>

    </div>

    <!-- SEARCH SCRIPT -->
    <script>
        function searchVideos() {

            let input = document.getElementById("searchInput").value.toLowerCase();
            let cards = document.querySelectorAll(".video-card");

            cards.forEach(card => {

                let title = card.querySelector("h3").textContent.toLowerCase();

                card.style.display = title.includes(input) ? "block" : "none";
            });
        }
    </script>

    <!-- 🔥 DOWNLOAD + ROLE SYSTEM -->
    <script>
        const role = localStorage.getItem("userRole");

        document.querySelectorAll(".download-btn").forEach(btn => {

            // თუ admin არ არის → დამალე download
            if (role !== "admin") {
                btn.style.display = "none";
            }

            btn.addEventListener("click", () => {

                if (role === "admin") {
                    const a = document.createElement("a");
                    a.href = btn.dataset.src;
                    a.download = "video.mp4";
                    a.click();
                }

            });

        });
    </script>

</body>
</html>
