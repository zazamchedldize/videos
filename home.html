<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <title>ვიდეოები</title>
    <link rel="stylesheet" href="style.css">
</head>

<body class="home-body">

    <!-- 👤 PROFILE TOP LEFT -->
    <div class="profile-box">
        <div id="userEmail">email</div>
        <div id="userRole">role</div>
    </div>

    <!-- HEADER -->
    <header>
        <h1>🎬 ვიდეოები</h1>
    </header>

    <!-- SEARCH -->
    <div class="search-box">
        <input
            type="text"
            id="searchInput"
            placeholder="🔍 მოძებნე ვიდეო..."
            onkeyup="searchVideos()"
        >
    </div>

    <!-- VIDEO GRID -->
    <div class="video-grid" id="videoGrid">

        <div class="video-card">
            <video class="video" controlsList="nodownload noplaybackrate" disablePictureInPicture controls src="videos/video1.mp4"></video>
            <div class="video-info">
                <h3>კუბლას გაპარვა</h3>
            </div>
        </div>

        <div class="video-card">
            <video class="video" controlsList="nodownload noplaybackrate" disablePictureInPicture controls src="videos/video2.mp4"></video>
            <div class="video-info">
                <h3>Damon Vs Elena</h3>
            </div>
        </div>

        <div class="video-card">
            <video class="video" controlsList="nodownload noplaybackrate" disablePictureInPicture controls src="videos/video3.mp4"></video>
            <div class="video-info">
                <h3>Hokage</h3>
            </div>
        </div>

        <div class="video-card">
            <video class="video" controlsList="nodownload noplaybackrate" disablePictureInPicture controls src="videos/video4.mp4"></video>
            <div class="video-info">
                <h3>Gigi Vs Ani</h3>
            </div>
        </div>

        <div class="video-card">
            <video class="video" controlsList="nodownload noplaybackrate" disablePictureInPicture controls src="videos/video5.mp4"></video>
            <div class="video-info">
                <h3>აბანცულა რანცულა</h3>
            </div>
        </div>

    </div>

    <!-- SEARCH -->
    <script>
        function searchVideos() {

            let input = document.getElementById("searchInput").value.toLowerCase();
            let cards = document.querySelectorAll(".video-card");

            cards.forEach(card => {

                let title = card.querySelector("h3").textContent.toLowerCase();

                card.style.display = title.includes(input) ? "block" : "none";
            });
        }
    </script>

    <!-- 🔥 ROLE + PROFILE SYSTEM -->
    <script>
        const email = localStorage.getItem("userEmail");
        const role = localStorage.getItem("userRole");

        document.getElementById("userEmail").textContent = email || "Guest";
        document.getElementById("userRole").textContent = role || "Visitor";

        // 🔥 ADMIN ONLY download override protection
        document.querySelectorAll("video").forEach(v => {

            if (role !== "admin") {
                v.addEventListener("contextmenu", e => e.preventDefault());
                v.setAttribute("controlsList", "nodownload noplaybackrate noremoteplayback");
            }

        });
    </script>

</body>
</html>
