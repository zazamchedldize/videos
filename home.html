<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <title>Videos</title>
    <link rel="stylesheet" href="style.css">
</head>

<body class="home-body">

<!-- PROFILE -->
<div class="profile-box">
    <div id="userEmail"></div>
    <div id="userRole"></div>
</div>

<header>
    <h1>🎬 ვიდეოები</h1>
</header>

<!-- SEARCH -->
<div class="search-box">
    <input type="text" id="searchInput" onkeyup="searchVideos()" placeholder="Search...">
</div>

<!-- VIDEOS -->
<div class="video-grid">

    <div class="video-card">
        <video controls src="videos/video1.mp4"></video>
        <div class="video-info">
            <h3>კუბლას გაპარვა</h3>
            <button class="download-btn" data-src="videos/video1.mp4">Download</button>
        </div>
    </div>

    <div class="video-card">
        <video controls src="videos/video2.mp4"></video>
        <div class="video-info">
            <h3>Damon Vs Elena</h3>
            <button class="download-btn" data-src="videos/video2.mp4">Download</button>
        </div>
    </div>

    <div class="video-card">
        <video controls src="videos/video3.mp4"></video>
        <div class="video-info">
            <h3>Hokage</h3>
            <button class="download-btn" data-src="videos/video3.mp4">Download</button>
        </div>
    </div>

    <div class="video-card">
        <video controls src="videos/video4.mp4"></video>
        <div class="video-info">
            <h3>Gigi Vs Ani</h3>
            <button class="download-btn" data-src="videos/video4.mp4">Download</button>
        </div>
    </div>

    <div class="video-card">
        <video controls src="videos/video5.mp4"></video>
        <div class="video-info">
            <h3>Video 5</h3>
            <button class="download-btn" data-src="videos/video5.mp4">Download</button>
        </div>
    </div>

</div>

<script>
/* PROFILE */
const email = localStorage.getItem("userEmail");
const role = localStorage.getItem("userRole");

const roleEl = document.getElementById("userRole");

document.getElementById("userEmail").textContent = email || "Guest";
roleEl.textContent = role || "Visitor";

/* ROLE STYLE FIX */
if (role === "Admin") {
    roleEl.classList.add("admin");
} else if (role === "Member") {
    roleEl.classList.add("member");
}

/* DOWNLOAD CONTROL */
const isAdmin = role === "Admin";

document.querySelectorAll(".video-card").forEach(card => {

    const btn = card.querySelector(".download-btn");

    if (!isAdmin && btn) {
        btn.remove();
    }

    if (isAdmin && btn) {
        btn.addEventListener("click", () => {
            const src = btn.dataset.src;

            const a = document.createElement("a");
            a.href = src;
            a.download = "video.mp4";
            a.click();
        });
    }
});

/* SEARCH */
function searchVideos() {
    let input = document.getElementById("searchInput").value.toLowerCase();
    let cards = document.querySelectorAll(".video-card");

    cards.forEach(card => {
        let title = card.querySelector("h3").textContent.toLowerCase();
        card.style.display = title.includes(input) ? "block" : "none";
    });
}
</script>

</body>
</html>
